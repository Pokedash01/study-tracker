<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>PL-400 + AI-102 Study Tracker</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <script>

    const SUPABASE_URL =
      "https://lvzvlpbzmktotmjhjysw.supabase.co";

    const SUPABASE_ANON_KEY =
      "PASTE_YOUR_ANON_KEY_HERE";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

  </script>

  <style>

    * {
      font-family: 'Inter', sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(99,102,241,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.15), transparent 30%),
        #0f172a;

      color: white;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);

      box-shadow:
        0 8px 32px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .task-complete {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .progress-glow {
      box-shadow:
        0 0 15px rgba(99,102,241,0.7),
        0 0 40px rgba(99,102,241,0.4);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
    }

    .hover-card {
      transition: all 0.25s ease;
    }

    .hover-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.2);
    }

    .gradient-text {
      background: linear-gradient(to right, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .checkbox {
      accent-color: #8b5cf6;
      width: 18px;
      height: 18px;
    }

    .table-row:hover {
      background: rgba(255,255,255,0.03);
    }

  </style>

</head>

<body class="min-h-screen p-4 md:p-8">

  <div class="max-w-7xl mx-auto">

    <!-- HERO -->

    <div class="glass rounded-3xl p-8 mb-8 relative overflow-hidden">

      <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10"></div>

      <div class="relative z-10 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

        <div>

          <p class="uppercase tracking-[0.3em] text-xs text-indigo-300 mb-3">
            Certification Roadmap
          </p>

          <h1 class="text-4xl md:text-5xl font-extrabold gradient-text">
            PL-400 + AI-102
          </h1>

          <p class="text-slate-300 mt-4 max-w-2xl leading-relaxed">
            Track your Microsoft certification journey beautifully.
          </p>

        </div>

        <div class="glass rounded-2xl p-6 min-w-[240px]">

          <p class="text-sm text-slate-400 mb-2">
            Overall Completion
          </p>

          <div class="text-5xl font-extrabold">
            <span id="heroProgress">0</span>%
          </div>

          <div class="mt-4 h-3 bg-white/10 rounded-full overflow-hidden">

            <div
              id="heroBar"
              class="h-full rounded-full bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 progress-glow transition-all duration-500"
              style="width:0%"
            ></div>

          </div>

        </div>

      </div>

    </div>

    <!-- STATS -->

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-8">

      <div class="glass hover-card rounded-3xl p-6">
        <p class="text-sm text-slate-400">Completed</p>

        <h2 id="completedCount" class="text-4xl font-bold mt-3">
          0
        </h2>
      </div>

      <div class="glass hover-card rounded-3xl p-6">
        <p class="text-sm text-slate-400">Total Tasks</p>

        <h2 id="totalCount" class="text-4xl font-bold mt-3">
          0
        </h2>
      </div>

      <div class="glass hover-card rounded-3xl p-6">
        <p class="text-sm text-slate-400">PL-400</p>

        <h2 id="plProgress" class="text-4xl font-bold mt-3 text-blue-400">
          0%
        </h2>
      </div>

      <div class="glass hover-card rounded-3xl p-6">
        <p class="text-sm text-slate-400">AI-102</p>

        <h2 id="aiProgress" class="text-4xl font-bold mt-3 text-purple-400">
          0%
        </h2>
      </div>

    </div>

    <!-- OVERALL PROGRESS -->

    <div class="glass rounded-3xl p-6 mb-8">

      <div class="flex justify-between items-center mb-4">

        <div>
          <h3 class="text-xl font-semibold">
            Overall Progress
          </h3>

          <p class="text-slate-400 text-sm mt-1">
            Keep building momentum.
          </p>
        </div>

        <span
          id="overallProgressText"
          class="text-2xl font-bold"
        >
          0%
        </span>

      </div>

      <div class="w-full h-5 bg-white/10 rounded-full overflow-hidden">

        <div
          id="overallBar"
          class="h-full rounded-full bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 progress-glow transition-all duration-500"
          style="width:0%"
        ></div>

      </div>

    </div>

    <!-- WEEKS -->

    <div id="weeksContainer" class="space-y-8"></div>

  </div>

<script>

const weeks = [

  {
    week: "Week 1",
    title: "PL-400 foundations + AI-102 overview",
    days: [
      {
        day: "Mon",
        pl: [
          "Read PL-400 exam skills outline",
          "Set up Power Apps dev environment"
        ],
        ai: [
          "Read AI-102 exam skills outline",
          "Watch Azure AI overview"
        ]
      },
      {
        day: "Tue",
        pl: [
          "Study canvas apps",
          "Build expense tracker app"
        ],
        ai: [
          "Study Cognitive Services",
          "Create Text Analytics resource"
        ]
      },
      {
        day: "Wed",
        pl: [
          "Study model-driven apps",
          "Create model-driven app"
        ],
        ai: [
          "Study Azure OpenAI Service",
          "Deploy GPT model"
        ]
      }
    ]
  }

];

const weeksContainer = document.getElementById("weeksContainer");

let totalTasks = 0;
let completedTasks = 0;
let plTotal = 0;
let aiTotal = 0;
let plDone = 0;
let aiDone = 0;

const saved = {};

function createTask(task, id, type) {

  totalTasks++;

  if(type === "pl") plTotal++;
  else aiTotal++;

  const checked = saved[id] || false;

  if(checked) {

    completedTasks++;

    if(type === "pl") plDone++;
    else aiDone++;

  }

  return `
    <label class="flex items-start gap-4 mb-4 cursor-pointer group">

      <input
        type="checkbox"
        class="checkbox mt-1"
        ${checked ? "checked" : ""}
        onchange="toggleTask('${id}', '${type}', this)"
      />

      <span
        class="
          transition-all duration-300
          text-slate-200
          group-hover:text-white
          ${checked ? 'task-complete' : ''}
        "
      >
        ${task}
      </span>

    </label>
  `;
}

function renderApp() {

  weeksContainer.innerHTML = "";

  totalTasks = 0;
  completedTasks = 0;
  plTotal = 0;
  aiTotal = 0;
  plDone = 0;
  aiDone = 0;

  weeks.forEach((week, wi) => {

    const card = document.createElement("div");

    card.className =
      "glass rounded-3xl overflow-hidden";

    let html = `
      <div
        class="
          px-6 py-5
          border-b border-white/10
          bg-gradient-to-r
          from-indigo-500/10
          to-purple-500/10
        "
      >

        <div class="flex items-center justify-between">

          <div>

            <h2 class="text-2xl font-bold">
              ${week.week}
            </h2>

            <p class="text-slate-300 mt-2">
              ${week.title}
            </p>

          </div>

          <div
            class="
              hidden md:flex
              items-center justify-center
              w-14 h-14
              rounded-2xl
              bg-white/10
              text-2xl
            "
          >
            🚀
          </div>

        </div>

      </div>

      <div class="overflow-x-auto">

        <table class="w-full min-w-[760px]">

          <thead>

            <tr class="text-left bg-white/5">

              <th class="p-5 border-b border-white/10 w-28">
                Day
              </th>

              <th class="p-5 border-b border-white/10">
                PL-400
              </th>

              <th class="p-5 border-b border-white/10">
                AI-102
              </th>

            </tr>

          </thead>

          <tbody>
    `;

    week.days.forEach((day, di) => {

      html += `
        <tr class="table-row transition-all duration-200">

          <td
            class="
              p-5 border-b border-white/5
              align-top font-semibold text-indigo-300
            "
          >
            ${day.day}
          </td>

          <td
            class="
              p-5 border-b border-white/5
              align-top
            "
          >
            ${day.pl.map((task, ti) =>
              createTask(
                task,
                `pl-${wi}-${di}-${ti}`,
                "pl"
              )
            ).join("")}
          </td>

          <td
            class="
              p-5 border-b border-white/5
              align-top
            "
          >
            ${day.ai.map((task, ti) =>
              createTask(
                task,
                `ai-${wi}-${di}-${ti}`,
                "ai"
              )
            ).join("")}
          </td>

        </tr>
      `;
    });

    html += `
          </tbody>

        </table>

      </div>
    `;

    card.innerHTML = html;

    weeksContainer.appendChild(card);

  });

}

async function loadProgress() {

  const { data, error } = await supabaseClient
    .from("study_progress")
    .select("*");

  if(data) {

    data.forEach(item => {
      saved[item.id] = item.completed;
    });

  }

  renderApp();

  updateUI();

}

function updateUI() {

  const overall =
    Math.round((completedTasks / totalTasks) * 100) || 0;

  const plPercent =
    Math.round((plDone / plTotal) * 100) || 0;

  const aiPercent =
    Math.round((aiDone / aiTotal) * 100) || 0;

  document.getElementById("completedCount").innerText =
    completedTasks;

  document.getElementById("totalCount").innerText =
    totalTasks;

  document.getElementById("plProgress").innerText =
    `${plPercent}%`;

  document.getElementById("aiProgress").innerText =
    `${aiPercent}%`;

  document.getElementById("overallProgressText").innerText =
    `${overall}%`;

  document.getElementById("overallBar").style.width =
    `${overall}%`;

  document.getElementById("heroProgress").innerText =
    overall;

  document.getElementById("heroBar").style.width =
    `${overall}%`;

}

function toggleTask(id, type, checkbox) {

  const label = checkbox.nextElementSibling;

  if(checkbox.checked) {

    saved[id] = true;

    completedTasks++;

    if(type === "pl") plDone++;
    else aiDone++;

    label.classList.add("task-complete");

  } else {

    saved[id] = false;

    completedTasks--;

    if(type === "pl") plDone--;
    else aiDone--;

    label.classList.remove("task-complete");

  }

  supabaseClient
    .from("study_progress")
    .upsert({
      id: id,
      completed: checkbox.checked
    })
    .then(() => {
      console.log("Saved");
    });

  updateUI();

}

loadProgress();

</script>

</body>
</html>
